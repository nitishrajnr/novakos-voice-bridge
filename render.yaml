services:
  - type: web
    name: novakos-voice-bridge
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: CARTESIA_AGENT_ID
        sync: false
